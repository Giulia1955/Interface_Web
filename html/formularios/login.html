<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        html{
            background-color: #95a5a6;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 100vh;
            margin: 0;
        }
        form{
            width: 50vw;
            background-color: #ecf0f1;
            border-radius: 5px;
            box-shadow: 3px 3px 10px #333;
        }
        input,label{
            display: block;
            width:100%;
            box-sizing: border-box;
        }
        label{
            margin-bottom: .75em;
        }
        input{
            padding: .75em;
            border-radius: 5px;
            border: 1px solid #bbb;
            margin-bottom: 1.5em;
            font-size: 1em;
        }
        fieldset{
            border: none;
        }
        legend{
            padding:1em;
            text-align: center;
            font-weight: bold;
            color: #454e4f;
            font-size: 1.2em;
        }
        
        .actions{
            display: flex;
            gap: 1em;
        }
        .btn{
            background-color: #95a5a6;
            color: white;
            cursor: pointer;
        }
        .btn2{
            background-color: #FA8072;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Formulario de Login</h1>
    <form action="#" method="get">
        <fieldset>
            <legend>Digite suas credenciais:</legend>
            <label for="user">Usuário:</label>
            <input type="text" id="user" required autofocus>
            <label for="password">Senha:</label>
            <input type="password" id="password">
            <div class="actions">
                <input type="reset" value="Delete" class="btn2">
                <input type="submit" value="Login" class="btn">
            </div>
            
        </fieldset>
</body>
</html>
