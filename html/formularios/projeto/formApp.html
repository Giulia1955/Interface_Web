<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="estilo1.css">
</head>
<body>

  <form action="#" method="post">
    
    <fieldset>
      <div class = "avatar">
        <img src="img/face.jpeg" alt="Avatar do usuário">
      </div>
      <h2>Login</h2>
      <div class="email">
        <img src="img/download.png" alt="icone email">
        <label for="email" >Email</label><br>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Email" 
          required>
      </div>
      <div class="password">
        <img src="img/cadeado.png" alt="icone cadeado">
        <label for="password">Password</label><br>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Password" 
          required>
      </div>

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>

      <div class="submit">
        <input type="submit" value="Sign In">
      </div>
      <div class="register">
        <span>Don’t have an account?</span>
        <a href="#">Register</a>
      </div>

    </fieldset>

  </form>

</body>
</html>
