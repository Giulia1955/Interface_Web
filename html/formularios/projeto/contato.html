<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="estilo2.css">
</head>
<body>

    <form action="#" method="post" autocomplete="off">  
        <fieldset>
            <legend>Personal Data</legend>
            
            <div class="form-row">
                <div class="field">
                    <img src="img/nome.png" alt="icone nome">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Full Name" required>
                </div>
                <div class="field">
                    <img src="img/documento.png" alt="icone cpf">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="CPF" required>
                </div>
            </div>

            <div class="form-row">
                <div class="field">
                    <img src="img/calendario.png" alt="icone calendario">
                <label for="birth_day">Date of Birth</label>
                <select id="birth_day" name="birth_day">
                    <option value="" disabled selected>Day</option>
                    <option value="1">01</option>
                    <option value="2">02</option>
                    <option value="3">03</option>
                    </select>
                </div>
                <div class="field">
                    <img src="img/telefone.png" alt="icone phone">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number">
                </div>
            </div>

            <div class="form-row">
                <div class="field">
                    <img src="img/cadeado.png" alt="icone password">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                </div>
                <div class="field">
                    <img src="img/cadeado.png" alt="icone password confirm">
                    <label for="confirm_password">Password (Confirm)</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Password">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Address</legend>
            
            <div class="form-row">
                <div class="field">
                    <img src="img/cep.png" alt="icone cep">
                    <label for="zipcode">ZIP Code (CEP)</label>
                    <input type="text" id="zipcode" name="zipcode" placeholder="ZIP Code (CEP)">
                </div>
                <div class="field">
                    <img src="img/rua.png" alt="icone rua">

                    <label for="street">Street</label>
                    <input type="text" id="street" name="street" placeholder="Street">
                </div>
            </div>

            <div class="form-row">
                <div class="field">
                    <img src="img/bairro.png" alt="icone bairro">
                    <label for="neighborhood">Neighborhood</label>
                    <input type="text" id="neighborhood" name="neighborhood" placeholder="Neighborhood">
                </div>
                <div class="field">
                    <img src="img/cidade.png" alt="icone cidade">

                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="City">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Professional Data</legend>
            
            <div class="form-row">
                <div class="field">
                    <img src="img/empresa.png" alt="icone empresa">

                    <label for="company">Company</label>
                    <input type="text" id="company" name="company" placeholder="Company">
                </div>
                <div class="field">
                    <img src="img/trabalho.png" alt="icone cargo">
                    <label for="job_title_primary">Job Title</label>
                    <input type="text" id="job_title_primary" name="job_title_primary" placeholder="Job Title">
                </div>
            </div>

            <div class="form-row">
                <div class="field">
                    <img src="img/download.png" alt="icone email">
                    <label for="job_title_secondary">Email</label>
                    <input type="email" id="job_title_secondary" name="job_title_secondary" placeholder="Email">
                </div>
                <div class="field">
                    <img src="img/linkedin.png" alt="icone linkedin">
                    <label for="linkedin">LinkedIn <u>URL</u></label>
                    <input type="url" id="linkedin" name="linkedin" placeholder="LinkedIn URL">
                </div>
            </div>
        </fieldset>

        <button type="submit" class="btn">Create Account</button>

    </form>
    
</body>
</html>
