<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Box</title>
    <style>
        .p1 {
            width: 300px;
            background-color: red;
            padding: 40px;
            color: white;
            box-sizing: content-box;
            
        }
        .p2 {
            color: white;
            background-color: black;
            box-sizing: border-box;
            padding: 40px;
        }
        .p3 {
            width: 300px;
            background-color: red;
            padding: 40px;
            color: white;
            box-sizing: content-box;

        }
    </style>
</head>
<body>
    <p class = "p1" > My seat is like full, full of water</p>
    <p class = "p2"> It must be... the water</p>
    <p class = "p3"> Let's add this to the words of wisdom</p>
</body>
</html>
