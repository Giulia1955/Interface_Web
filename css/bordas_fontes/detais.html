<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
</head>
<body>
    <h1>Desenvolvimento de Interface Web</h1>
    <details>
        <summary>Detalhes</summary>
        <p>Este é um exemplo de detalhes usando a tag details e summary.</p>
        <summary>Mais detalhes</summary>
        <p>yellow submarinee.</p>
    </details>
    <button popovertarget="myPopover">Toogle Popover</button>
    <div id="myPopover" popover>
        <p>Este é um popover usando a tag popovertarget.</p>
    </div>
</body>
</html>
