<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box</title>

    <style>
        .flexbox{
            height: 500px;
            border: 5px solid blue;
            margin-bottom: 20px;
            display: flex;
        }
        .flexbox div{
            border: 3px solid pink;
            width: 350px;
            margin: 10px;
        }
        .flex-container1{
            flex-wrap: wrap;
            flex-direction: row;
        }
        .flex-container2 div{
            width: 30px;
            margin: 0;
        }
        .flex-container2{
            flex-direction: row;
            justify-content: space-evenly;
        }
        .flex-container3{
            flex-direction: row;
            justify-content: space-around;
            align-items: center;

        }
        .flex-container3 div{
            width: 30px;
            margin: 0;
        }
        .flex-container4{
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
        }
        .flex-container4 div{
            width: 300px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class = "flexbox flex-container1">
        <div class = "div1">Div1</div>
        <div class = "div2">Div2</div>
        <div class = "div2">Div3</div>
        <div class = "div4">Div4</div>
    </div>

    <div class = "flexbox flex-container2">
        <div class = "div1">Div1</div>
        <div class = "div2">Div2</div>
        <div class = "div2">Div3</div>
        <div class = "div4">Div4</div>
    </div>

    <div class = "flexbox flex-container3">
        <div class = "div1">Div1</div>
        <div class = "div2">Div2</div>
        <div class = "div2">Div3</div>
        <div class = "div4">Div4</div>
    </div>

    <div class = "flexbox flex-container4">
        <div class = "div1">Div1</div>
        <div class = "div2">Div2</div>
        <div class = "div2">Div3</div>
        <div class = "div4">Div4</div>
    </div>
</body>
</html>
